---
# Use shell + throttle to avoid race when all hosts delegate to localhost simultaneously
- name: Remove stale SSH known_hosts entry for this host
  ansible.builtin.shell: |
    ssh-keygen -R {{ ansible_host }} -f ~/.ssh/known_hosts 2>/dev/null || true
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  throttle: 1
  changed_when: false

# DEB822 format uses "Enabled: no" — commenting out the Types line breaks parsing
- name: Disable Proxmox enterprise subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-enterprise.sources
    content: |
      # Enterprise repo disabled — no subscription
      Enabled: no
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-enterprise
    mode: '0644'
  ignore_errors: true

# Remove the default proxmox.sources if it exists — it points to the same URI as
# pve-no-subscription.sources but with a different Signed-By path, which causes
# apt to refuse to read sources ("Conflicting values set for option Signed-By").
- name: Remove conflicting default proxmox.sources if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/proxmox.sources
    state: absent

- name: Add Proxmox no-subscription repo (DEB822 format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    content: |
      Types: deb
      URIs: {{ proxmox_no_sub_repo_url }}
      Suites: {{ proxmox_no_sub_repo_suite }}
      Components: pve-no-subscription
      Signed-By: /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
    mode: '0644'

- name: Disable Ceph enterprise repo (.list format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.list
    content: "# Ceph enterprise repo disabled\n"
    mode: '0644'
  ignore_errors: true

- name: Disable Ceph enterprise repo (DEB822 format)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.sources
    content: |
      # Ceph enterprise repo disabled
      Enabled: no
      Types: deb
      URIs: https://enterprise.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: enterprise
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
    mode: '0644'
  ignore_errors: true

- name: Run apt update and dist-upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: true

- name: Check if ansible@pam user already exists
  ansible.builtin.command: pveum user list --output-format json
  register: pveum_users
  changed_when: false

- name: Create ansible@pam user
  ansible.builtin.command: pveum user add {{ proxmox_api_user }} --comment "Ansible automation user"
  when: proxmox_api_user not in pveum_users.stdout

- name: Grant PVEAdmin role to ansible@pam
  ansible.builtin.command: pveum acl modify / --users {{ proxmox_api_user }} --roles {{ proxmox_api_role }}
  when: proxmox_api_user not in pveum_users.stdout

- name: Check if API token already exists
  ansible.builtin.command: pveum user token list {{ proxmox_api_user }} --output-format json
  register: pveum_tokens
  changed_when: false
  ignore_errors: true

- name: Create API token for ansible@pam
  ansible.builtin.command: >
    pveum user token add {{ proxmox_api_user }} {{ proxmox_api_token_id }}
    --privsep 0 --output-format json
  register: token_create
  when: proxmox_api_token_id not in (pveum_tokens.stdout | default(''))

- name: Display API token (save this to vault manually)
  ansible.builtin.debug:
    msg: |
      TOKEN SECRET (add to vault as proxmox_api_token_secret):
      {{ (token_create.stdout | from_json).value | default('token already exists') }}
  when: token_create.changed | default(false)

# Ensure /etc/hosts has the correct IP for this node's hostname.
# After IP normalization (Mar 2026), R640s had stale IPs in /etc/hosts
# which caused pvecm add to pick up a non-existent address.
- name: Ensure correct hostname-to-IP in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "{{ inventory_hostname_short }}"
    line: "{{ ansible_host }}  {{ inventory_hostname }} {{ inventory_hostname_short }}"
    state: present

- name: Verify vmbr0 bridge exists
  ansible.builtin.command: ip link show vmbr0
  register: vmbr0_check
  changed_when: false
  failed_when: vmbr0_check.rc != 0
