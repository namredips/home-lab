---
- name: Ensure zfsutils-linux is installed
  ansible.builtin.apt:
    name: zfsutils-linux
    state: present
    update_cache: true

- name: Check if each ZFS pool already exists
  ansible.builtin.command: zpool list {{ item.name }}
  register: zpool_checks
  ignore_errors: true
  changed_when: false
  no_log: true
  loop: "{{ zfs_pools | default([]) }}"

- name: Create ZFS pools (standard single-vdev or simple RAID)
  ansible.builtin.command: >
    zpool create {{ item.item.options | default('') }}
    {{ item.item.name }}
    {{ item.item.mode | default('') }}
    {{ item.item.devices | join(' ') }}
  when:
    - item.rc != 0
    - item.item.custom_create_cmd is not defined
  loop: "{{ zpool_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Create ZFS pools (custom command for multi-vdev configs)
  ansible.builtin.command: "{{ item.item.custom_create_cmd }}"
  when:
    - item.rc != 0
    - item.item.custom_create_cmd is defined
  loop: "{{ zpool_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Set ZFS compression=lz4 on each pool
  ansible.builtin.command: zfs set compression=lz4 {{ item.name }}
  loop: "{{ zfs_pools | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Set ZFS atime=off on each pool
  ansible.builtin.command: zfs set atime=off {{ item.name }}
  loop: "{{ zfs_pools | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

# Storage config is cluster-wide in Proxmox (/etc/pve/storage.cfg via pmxcfs).
# Only master registers storages — all nodes see them automatically.
- name: Check which pools are already registered in Proxmox
  ansible.builtin.command: pvesm list {{ item.name }}
  register: pvesm_checks
  ignore_errors: true
  changed_when: false
  no_log: true
  loop: "{{ zfs_pools | default([]) }}"
  when: inventory_hostname in groups['proxmox_master']

- name: Register zfspool-type storage (supports images, rootdir)
  ansible.builtin.command: >
    pvesm add zfspool
    {{ item.item.name }}
    --pool {{ item.item.name }}
    --content {{ item.item.proxmox_content }}
    --sparse 1
  when:
    - inventory_hostname in groups['proxmox_master']
    - item.rc != 0
    - item.item.proxmox_storage_type == 'zfspool'
  loop: "{{ pvesm_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Register dir-type storage (supports backup, iso, vztmpl, snippets, images)
  ansible.builtin.command: >
    pvesm add dir
    {{ item.item.name }}
    --path {{ item.item.proxmox_path }}
    --content {{ item.item.proxmox_content }}
  when:
    - inventory_hostname in groups['proxmox_master']
    - item.rc != 0
    - item.item.proxmox_storage_type == 'dir'
  loop: "{{ pvesm_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Show current storage status
  ansible.builtin.command: pvesm status
  register: pvesm_status
  changed_when: false

- name: Display storage status
  ansible.builtin.debug:
    msg: "{{ pvesm_status.stdout_lines }}"
