---
# Cloud credential deployment for agent VMs
# All credential files are mode 0600 (owner read-only)
# Tasks skip gracefully if vault keys are not yet populated

# AWS credentials
- name: Create .aws directory
  file:
    path: ~/.aws
    state: directory
    mode: '0700'
  when: vault_aws_access_key_id is defined

- name: Deploy AWS credentials
  template:
    src: aws_credentials.j2
    dest: ~/.aws/credentials
    mode: '0600'
  when: vault_aws_access_key_id is defined
  no_log: true

- name: Deploy AWS config
  template:
    src: aws_config.j2
    dest: ~/.aws/config
    mode: '0600'
  when: vault_aws_access_key_id is defined

# GCP service account
- name: Create gcloud config directory
  file:
    path: ~/.config/gcloud
    state: directory
    mode: '0700'
  when: vault_gcp_service_account_json is defined

- name: Deploy GCP service account key
  template:
    src: gcp_service_account.j2
    dest: ~/.config/gcloud/service-account.json
    mode: '0600'
  when: vault_gcp_service_account_json is defined
  no_log: true

- name: Set GOOGLE_APPLICATION_CREDENTIALS in bash profile
  lineinfile:
    path: ~/.bash_profile
    line: 'export GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/gcloud/service-account.json"'
    create: yes
  when: vault_gcp_service_account_json is defined

# Google OAuth credentials (personal account for Gmail/Drive/Sheets)
- name: Create google config directory
  file:
    path: ~/.config/google
    state: directory
    mode: '0700'
  when: vault_google_oauth_client_id is defined

- name: Deploy Google OAuth credentials
  template:
    src: google_credentials.j2
    dest: ~/.config/google/credentials.json
    mode: '0600'
  when: vault_google_oauth_client_id is defined
  no_log: true

- name: Note about Google OAuth scope
  debug:
    msg:
      - "Google OAuth credentials deployed."
      - "Scope: Gmail API, Drive API, Sheets API (namredips@gmail.com)"
      - "Access is scoped via the OAuth consent screen — review before expanding."
  when: vault_google_oauth_client_id is defined
