---
- name: Create workspace directory
  file:
    path: "/home/{{ ansible_user }}/workspace/infiquetra"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Clone infiquetra repositories
  git:
    repo: "git@github.com:infiquetra/{{ repo_item }}.git"
    dest: "/home/{{ ansible_user }}/workspace/infiquetra/{{ repo_item }}"
    accept_hostkey: yes
    update: no
  become_user: "{{ ansible_user }}"
  loop: "{{ infiquetra_repos }}"
  loop_control:
    loop_var: repo_item
  register: clone_results
  failed_when:
    - clone_results.failed
    - "'already exists' not in (clone_results.msg | default(''))"
    - "'Permission denied' not in (clone_results.msg | default(''))"
    - "'Repository not found' not in (clone_results.msg | default(''))"

- name: Report clone results
  debug:
    msg: >-
      {{ repo_item.repo_item | default(repo_item.item | default('unknown')) }}: {{ 'cloned' if repo_item.changed | default(false) else 'already exists or skipped' }}
  loop: "{{ clone_results.results }}"
  loop_control:
    loop_var: repo_item
  ignore_errors: yes
