---
# agent_provision role defaults
reset: False

# Development tools and packages
base_packages:
  - build-essential
  - curl
  - wget
  - git
  - vim
  - neovim
  - tmux
  - htop
  - jq
  - ripgrep
  - fd-find
  - fzf
  - tree
  - unzip
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - shellcheck

# Language runtimes
install_python: true
python_version: "3.12"

install_nodejs: true
nodejs_version: "22"

install_dart_flutter: true
flutter_channel: stable

install_rust: true

install_golang: true
golang_version: "1.25.7"

install_cpp: true

# Development tools (linters, formatters, LSP servers)
install_dev_tools: true

# Dotfiles force refresh (override force: no — delete existing before re-deploying)
force_dotfiles_refresh: false

# AI coding tools
install_claude_code: true
install_codex_cli: true
install_gemini_cli: true

# AWS tools
install_aws_cli: true
install_aws_cdk: true

# Docker
install_docker: true

# Shell configuration
install_oh_my_bash: false
install_starship: false
install_oh_my_posh: true
oh_my_posh_theme: default-posh-prompt.omp.json
deploy_bin_scripts: true
install_vim_plug: true
install_nerd_fonts: true

# Dotfiles repository
dotfiles_repo: "git@github.com:namredips/dotfiles.git"
dotfiles_branch: "master"
dotfiles_local_path: "/tmp/dotfiles-checkout"
deploy_dotfiles_from_repo: true

# Claude Code configuration from dotfiles
deploy_claude_config: true

# Shell config source: "template" or "dotfiles"
shell_config_source: "template"

# Agent identity (mirrors openclaw role defaults)
agent_name: "{{ inventory_hostname_short }}"
agent_email: "{{ inventory_hostname_short }}@infiquetra.com"

# GitHub configuration
github_org: "infiquetra"

# Infiquetra repos to clone on each agent VM
# Run clone_repos.yml after SSH keys are registered in GitHub
infiquetra_repos:
  - home-lab
  - knowledge-base

# Cloud credentials (deploy only when vault keys are present)
deploy_aws_credentials: true
deploy_gcp_credentials: true
deploy_google_oauth: true
aws_default_region: us-east-1

# Extra development tools
install_extra_python_tools: true
install_go_tools: true
install_rust_tools: true
install_git_extras: true
install_shell_tools: true

# Beads task coordination CLI
install_beads: true
