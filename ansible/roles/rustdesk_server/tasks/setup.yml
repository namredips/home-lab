---
# ── Docker CE installation ────────────────────────────────────────────────────
- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Add Docker apt repository
  ansible.builtin.shell:
    cmd: >
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
      > /etc/apt/sources.list.d/docker.list
    creates: /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Add agent user to docker group
  ansible.builtin.user:
    name: agent
    groups: docker
    append: true
  become: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

# ── RustDesk server deployment ────────────────────────────────────────────────
- name: Create RustDesk data directory
  ansible.builtin.file:
    path: "{{ rustdesk_data_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ rustdesk_data_dir }}/docker-compose.yml"
    mode: '0644'
  become: true

- name: Pull RustDesk images and start containers
  ansible.builtin.command:
    cmd: docker compose up -d --pull always --force-recreate --remove-orphans
    chdir: "{{ rustdesk_data_dir }}"
  become: true
  changed_when: true

# Key file appears a few seconds after hbbs first starts
- name: Wait for RustDesk key file to be generated
  ansible.builtin.wait_for:
    path: "{{ rustdesk_data_dir }}/id_ed25519.pub"
    timeout: 30
  become: true

- name: Read RustDesk public key
  ansible.builtin.slurp:
    src: "{{ rustdesk_data_dir }}/id_ed25519.pub"
  register: rustdesk_pubkey
  become: true

- name: Display RustDesk connection info
  ansible.builtin.debug:
    msg:
      - "RustDesk server is running at {{ ansible_host }}"
      - "Public key: {{ rustdesk_pubkey.content | b64decode | trim }}"
      - "Configure clients: relay={{ ansible_host }}, key=<above>"
      - "Remember to add DHCP reservation: MAC 52:54:00:c8:00:3c → 10.220.1.60 (rustdesk)"
