---
# ── Pre-deploy cloud-init snippets to all nodes ─────────────────────────────
# Snippets must be present on EVERY Proxmox node because:
#   - qm set --cicustom is run on master (for cloning), reads local:snippets/
#   - After migration, if Proxmox regenerates the cloud-init drive, it reads
#     local:snippets/ on the VM's current node
# Using local:snippets/ ensures all 6 nodes have the snippet available locally.

- name: Generate password hash for VM user ({{ vm_ssh_user }})
  ansible.builtin.command:
    argv:
      - openssl
      - passwd
      - -6
      - "{{ vm_user_password }}"
  register: pw_hash
  changed_when: false
  run_once: false   # generate fresh hash per node (different salts are fine)

- name: Read SSH keys from authorized_keys
  ansible.builtin.slurp:
    src: /root/.ssh/authorized_keys
  register: node_auth_keys

- name: Ensure local snippets directory exists
  ansible.builtin.file:
    path: /var/lib/vz/snippets
    state: directory
    mode: '0755'

- name: Deploy cloud-init user-data snippet for all agents
  ansible.builtin.template:
    src: agent-user-data.j2
    dest: /var/lib/vz/snippets/{{ item.key }}-user-data.yaml
    mode: '0644'
  loop: "{{ agents | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    agent_name: "{{ item.key }}"
    vm_user_password_hash: "{{ pw_hash.stdout | trim }}"
    vm_ssh_keys: >-
      {{
        (node_auth_keys.content | b64decode).splitlines()
        | select('match', '^ssh-')
        | list
      }}

- name: Deploy cloud-init user-data snippet for all service VMs
  ansible.builtin.template:
    src: agent-user-data.j2
    dest: /var/lib/vz/snippets/{{ item.key }}-user-data.yaml
    mode: '0644'
  loop: "{{ service_vms | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    agent_name: "{{ item.key }}"
    vm_user_password_hash: "{{ pw_hash.stdout | trim }}"
    vm_ssh_keys: >-
      {{
        (node_auth_keys.content | b64decode).splitlines()
        | select('match', '^ssh-')
        | list
      }}

# ── Filter agents assigned to this Proxmox host ─────────────────────────────
- name: Build list of agents for this host
  ansible.builtin.set_fact:
    host_agents: >-
      {{
        agents | dict2items
        | selectattr('value.host', 'equalto', inventory_hostname)
        | list
      }}

- name: Show agents assigned to this host
  ansible.builtin.debug:
    msg: "Creating VMs on {{ inventory_hostname }}: {{ host_agents | map(attribute='key') | list }}"

- name: Create VMs for each assigned agent
  ansible.builtin.include_tasks: create_vm.yml
  vars:
    agent_name: "{{ item.key }}"
    agent: "{{ item.value }}"
  loop: "{{ host_agents }}"
  loop_control:
    label: "{{ item.key }} (vmid {{ item.value.vmid }})"

# ── Service VMs assigned to this Proxmox host ────────────────────────────────
- name: Build list of service VMs for this host
  ansible.builtin.set_fact:
    host_service_vms: >-
      {{
        service_vms | dict2items
        | selectattr('value.host', 'equalto', inventory_hostname)
        | list
      }}

- name: Show service VMs assigned to this host
  ansible.builtin.debug:
    msg: "Creating service VMs on {{ inventory_hostname }}: {{ host_service_vms | map(attribute='key') | list }}"

- name: Create VMs for each assigned service VM
  ansible.builtin.include_tasks: create_vm.yml
  vars:
    agent_name: "{{ item.key }}"
    agent: "{{ item.value }}"
  loop: "{{ host_service_vms }}"
  loop_control:
    label: "{{ item.key }} (vmid {{ item.value.vmid }})"
