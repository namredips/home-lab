---
# Called per-agent with vars: agent_name, agent (dict with vmid, mac, ip, etc.)
# Snippets are pre-deployed in setup.yml to every node's local:snippets/.

# Check from target node — qm status only sees VMs local to this node
- name: Check if VM {{ agent.vmid }} ({{ agent_name }}) already exists
  ansible.builtin.command: qm status {{ agent.vmid }}
  register: vm_check
  changed_when: false
  failed_when: false

# Clone and configure on master (template VM 9000 is local to master).
# For non-master targets, qm clone without --target creates the VM on master.
# We migrate it after configuration.
# agent.storage overrides vm_storage for VMs that need a different pool
# (e.g. PBS uses ceph-bulk for its large backup store, agents use ceph-fast)
- name: Clone template to create VM {{ agent.vmid }} ({{ agent_name }}) on master
  ansible.builtin.command: >
    qm clone {{ template_vmid }} {{ agent.vmid }}
    --name {{ agent_name }}
    --full true
    --storage {{ agent.storage | default(vm_storage) }}
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when: vm_check.rc != 0

- name: Configure VM resources
  ansible.builtin.command: >
    qm set {{ agent.vmid }}
    --memory {{ agent.memory_mb }}
    --cores {{ agent.vcpus }}
    --cpu host
    --net0 virtio={{ agent.mac }},bridge=vmbr0
    --onboot 1
    --agent enabled=1
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when: vm_check.rc != 0

- name: Resize disk to {{ agent.disk_gb }}G
  ansible.builtin.command: qm disk resize {{ agent.vmid }} scsi0 {{ agent.disk_gb }}G
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when: vm_check.rc != 0

# --cicustom user= replaces Proxmox's auto-generated user-data (which includes
# package_upgrade: true).  The snippet is on local:snippets/ of every node.
# Omit --sshkeys and --cipassword here — they're in the snippet instead.
- name: Set cloud-init config (static IP)
  ansible.builtin.command: >
    qm set {{ agent.vmid }}
    --ciuser {{ vm_ssh_user }}
    --ipconfig0 ip={{ agent.ip }}/24,gw=10.220.1.1
    --nameserver 10.220.1.1
    --searchdomain infiquetra.com
    --cicustom user=local:snippets/{{ agent_name }}-user-data.yaml
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when:
    - vm_check.rc != 0
    - agent.ip is defined

- name: Set cloud-init config (DHCP — no static IP defined)
  ansible.builtin.command: >
    qm set {{ agent.vmid }}
    --ciuser {{ vm_ssh_user }}
    --ipconfig0 ip=dhcp
    --nameserver 10.220.1.1
    --searchdomain infiquetra.com
    --cicustom user=local:snippets/{{ agent_name }}-user-data.yaml
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when:
    - vm_check.rc != 0
    - agent.ip is not defined

# With Ceph RBD (shared storage), the disk already lives in the cluster-wide pool.
# Migration just moves VM config — no disk streaming needed, so no --with-local-disks.
- name: Migrate VM {{ agent.vmid }} to {{ inventory_hostname_short }}
  ansible.builtin.command: >
    qm migrate {{ agent.vmid }} {{ inventory_hostname_short }}
  delegate_to: "{{ groups['proxmox_master'][0] }}"
  when:
    - vm_check.rc != 0
    - inventory_hostname not in groups['proxmox_master']

- name: Start VM {{ agent.vmid }} ({{ agent_name }})
  ansible.builtin.command: qm start {{ agent.vmid }}
  when: vm_check.rc != 0

# VMs use DHCP — static IP requires a UDM reservation for the VM's MAC.
# Add reservations in UniFi (Settings → Networks → Default → DHCP → Static Leases)
# before running agent provisioning.  SSH wait is non-fatal here.
- name: Wait for SSH on {{ agent_name }} ({{ agent.ip }})
  ansible.builtin.wait_for:
    host: "{{ agent.ip }}"
    port: 22
    delay: 15
    timeout: 120
    state: started
  delegate_to: localhost
  become: false
  ignore_errors: true
  when: vm_check.rc != 0

- name: Show VM {{ agent.vmid }} status
  ansible.builtin.command: qm status {{ agent.vmid }}
  register: vm_status
  changed_when: false

- name: Display VM status
  ansible.builtin.debug:
    msg: "{{ agent_name }} ({{ agent.vmid }}): {{ vm_status.stdout }}"
