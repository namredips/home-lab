---
reset: false

# Minimum fan speed floor (PWM percentage, 0-100)
# These PWM values map to ~1680-3120 RPM depending on server model:
#   5%  → r420: ~1800-2400 RPM, r720xd/r820: ~3000-3120 RPM
#  10%  → r720xd: ~3960 RPM
#  20%  → r720xd: ~4800 RPM
# iDRAC thermal protection still overrides this floor if temps get high
# Increase to 15-20% only if adding heavy GPU/NVMe compute workloads
fan_min_pct: 5

# Map pct → raw IPMI hex value (0x00-0x64 = 0-100%)
_fan_pct_map:
  5: "0x05"
  10: "0x0a"
  15: "0x0f"
  20: "0x14"
  25: "0x19"
  30: "0x1e"
  35: "0x23"
  40: "0x28"
  45: "0x2d"
  50: "0x32"

# Disable 3rd-party PCIe card fan response override
# Only supported on Dell 14th gen servers (R640, R740, etc.) with iDRAC 9
# Set to false for R420/R720xd/R820 (older iDRAC)
disable_pcie_fan_override: true

# Script install path on Proxmox hosts
fan_control_script: /usr/local/bin/dell_fan_control.sh
