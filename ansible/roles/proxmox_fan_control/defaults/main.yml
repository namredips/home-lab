---
reset: false

# Minimum fan speed floor (PWM percentage, 0-100)
# These PWM values map to ~1680-4800 RPM depending on server model:
#   5%  → r420: ~1800-2400 RPM, r820: ~3000-3120 RPM  ← DO NOT USE: too low
#  10%  → r820: ~3960 RPM
#  20%  → r820: ~4800 RPM  ← reasonable quiet floor
# WARNING: manual mode (enabled by this role) disables the iDRAC automatic thermal
# ramp-up algorithm. Fans stay at this fixed floor until a reboot or auto mode is
# restored. Set to at least 20% to leave thermal headroom.
fan_min_pct: 20

# Map pct → raw IPMI hex value (0x00-0x64 = 0-100%)
_fan_pct_map:
  5: "0x05"
  10: "0x0a"
  15: "0x0f"
  20: "0x14"
  25: "0x19"
  30: "0x1e"
  35: "0x23"
  40: "0x28"
  45: "0x2d"
  50: "0x32"

# Disable 3rd-party PCIe card fan response override
# Only supported on Dell 14th gen servers (R640, R740, etc.) with iDRAC 9
# Set to false for R420/R720xd/R820 (older iDRAC)
disable_pcie_fan_override: true

# Script install path on Proxmox hosts
fan_control_script: /usr/local/bin/dell_fan_control.sh
