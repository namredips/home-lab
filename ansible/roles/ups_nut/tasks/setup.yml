---
# ── Packages ───────────────────────────────────────────────────────────────────
- name: Install NUT packages (server)
  ansible.builtin.apt:
    name:
      - nut
      - nut-server
    state: present
    update_cache: true
  become: true
  when: nut_mode == 'netserver'

- name: Install NUT packages (client)
  ansible.builtin.apt:
    name:
      - nut-client
    state: present
    update_cache: true
  become: true
  when: nut_mode == 'netclient'

# ── NUT mode ───────────────────────────────────────────────────────────────────
- name: Deploy nut.conf (sets netserver or netclient mode)
  ansible.builtin.template:
    src: nut.conf.j2
    dest: /etc/nut/nut.conf
    mode: '0640'
    owner: root
    group: nut
  become: true
  notify: Restart nut-monitor

# ── Server-only config ─────────────────────────────────────────────────────────
- name: Deploy server configs
  when: nut_mode == 'netserver'
  block:
    - name: Deploy ups.conf (driver definitions for all USB-connected devices)
      ansible.builtin.template:
        src: ups.conf.j2
        dest: /etc/nut/ups.conf
        mode: '0640'
        owner: root
        group: nut
      become: true
      notify: Restart nut-server

    - name: Deploy upsd.conf (listen address)
      ansible.builtin.template:
        src: upsd.conf.j2
        dest: /etc/nut/upsd.conf
        mode: '0640'
        owner: root
        group: nut
      become: true
      notify: Restart nut-server

    - name: Deploy upsd.users (monitor credentials)
      ansible.builtin.template:
        src: upsd.users.j2
        dest: /etc/nut/upsd.users
        mode: '0640'
        owner: root
        group: nut
      become: true
      notify: Restart nut-server

    - name: Deploy UPS shutdown script
      ansible.builtin.copy:
        src: ups-shutdown.sh
        dest: /usr/local/bin/ups-shutdown.sh
        mode: '0755'
        owner: root
        group: root
      become: true

    - name: Enable and start nut-server
      ansible.builtin.systemd:
        name: nut-server
        enabled: true
        state: started
        daemon_reload: true
      become: true

# ── upsmon — only on hosts that are physically powered by a monitored UPS ──────
- name: Deploy upsmon.conf
  ansible.builtin.template:
    src: upsmon.conf.j2
    dest: /etc/nut/upsmon.conf
    mode: '0640'
    owner: root
    group: nut
  become: true
  notify: Restart nut-monitor
  when: nut_monitor | length > 0

- name: Enable and start nut-monitor
  ansible.builtin.systemd:
    name: nut-monitor
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: nut_monitor | length > 0

- name: Disable nut-monitor (host not on any monitored UPS)
  ansible.builtin.systemd:
    name: nut-monitor
    enabled: false
    state: stopped
  become: true
  when: nut_monitor | length == 0
  ignore_errors: true

- name: Display NUT status
  ansible.builtin.debug:
    msg:
      - "NUT mode: {{ nut_mode }}"
      - "Devices served: {{ nut_devices | map(attribute='name') | list | join(', ') if nut_devices else 'none' }}"
      - "Devices monitored (shutdown): {{ nut_monitor | map(attribute='name') | list | join(', ') if nut_monitor else 'none (shutdown disabled)' }}"
