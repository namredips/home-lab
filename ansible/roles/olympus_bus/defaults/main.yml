---
reset: false

# Redis configuration
redis_port: 6379
redis_bind: "10.220.1.64 127.0.0.1"
redis_maxmemory: "2gb"
redis_maxmemory_policy: "allkeys-lru"
redis_save_intervals:
  - "3600 1"
  - "300 100"
  - "60 10000"

# Dolt server configuration
dolt_port: 3306
dolt_database: "olympus"
dolt_user: "agent"
dolt_install_dir: "/opt/dolt"
dolt_data_dir: "/var/lib/dolt"
dolt_config_dir: "/etc/dolt"
# Canonical beads project ID for the olympus Dolt database.
# Must match the _project_id in the olympus.metadata table.
# All agents write this to ~/.beads/metadata.json instead of running bd init.
beads_project_id: "24542c48-1e8f-4b94-bb60-353973b37f5b"
olympus_bus_host: "10.220.1.64"

# Discord bridge
bridge_redis_channel_pattern: "olympus:discord:*"
bridge_poll_interval: 1

# GitHub-beads sync
github_org: "infiquetra"

# Service user
olympus_user: "agent"
