---
- name: Stop and disable olympus-bus services
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  become: yes
  loop:
    - github-beads-sync.timer
    - github-beads-sync.service
    - olympus-bridge
    - dolt-server
    - redis-server
  ignore_errors: yes

- name: Remove olympus-bus service and config files
  file:
    path: "{{ item }}"
    state: absent
  become: yes
  loop:
    - /etc/systemd/system/olympus-bridge.service
    - /etc/systemd/system/dolt-server.service
    - /etc/systemd/system/github-beads-sync.service
    - /etc/systemd/system/github-beads-sync.timer
    - /opt/olympus-bridge
    - "{{ dolt_config_dir }}"

- name: Reload systemd
  systemd:
    daemon_reload: yes
  become: yes
