---
- name: Check if template VM already exists
  ansible.builtin.command: qm status {{ template_vmid }}
  register: template_check
  changed_when: false
  failed_when: false

- name: Ensure cloud image directory exists
  ansible.builtin.file:
    path: "{{ cloud_image_dest }}"
    state: directory
    mode: '0755'
  when: template_check.rc != 0

- name: Download Ubuntu 24.04 cloud image
  ansible.builtin.get_url:
    url: "{{ cloud_image_url }}"
    dest: "{{ cloud_image_dest }}/{{ cloud_image_filename }}"
    mode: '0644'
    checksum: "sha256:https://cloud-images.ubuntu.com/releases/24.04/release/SHA256SUMS"
  when: template_check.rc != 0

- name: Create template VM base
  ansible.builtin.command: >
    qm create {{ template_vmid }}
    --name {{ template_name }}
    --memory {{ template_memory }}
    --cores {{ template_cores }}
    --net0 virtio,bridge=vmbr0
    --ostype l26
    --scsihw virtio-scsi-pci
  when: template_check.rc != 0

- name: Import cloud image as primary disk
  ansible.builtin.command: >
    qm set {{ template_vmid }}
    --scsi0 {{ template_storage }}:0,import-from={{ cloud_image_dest }}/{{ cloud_image_filename }}
  when: template_check.rc != 0

- name: Add cloud-init drive
  ansible.builtin.command: >
    qm set {{ template_vmid }}
    --ide2 {{ template_storage }}:cloudinit
  when: template_check.rc != 0

- name: Configure boot order, display, and serial console
  ansible.builtin.command: >
    qm set {{ template_vmid }}
    --boot order=scsi0
    --serial0 socket
    --vga qxl
    --agent enabled=1
  when: template_check.rc != 0

- name: Convert VM to template
  ansible.builtin.command: qm template {{ template_vmid }}
  when: template_check.rc != 0

- name: Verify template exists
  ansible.builtin.command: qm status {{ template_vmid }}
  register: final_check
  changed_when: false

- name: Show template status
  ansible.builtin.debug:
    msg: "Template {{ template_vmid }} status: {{ final_check.stdout }}"
