---
# Deploy Prometheus + Grafana + node_exporter via Docker Compose
# on the monitoring VM (VMID 203, 10.220.1.63).

# ── Docker CE ─────────────────────────────────────────────────────────────────
- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Add Docker apt repository
  ansible.builtin.shell:
    cmd: >
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
      > /etc/apt/sources.list.d/docker.list
    creates: /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Add agent user to docker group
  ansible.builtin.user:
    name: agent
    groups: docker
    append: true
  become: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

# ── Monitoring stack ──────────────────────────────────────────────────────────
- name: Create monitoring data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ monitoring_data_dir }}"
    - "{{ monitoring_data_dir }}/prometheus"
  become: true

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_data_dir }}/prometheus/prometheus.yml"
    mode: '0644'
  become: true

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_data_dir }}/docker-compose.yml"
    mode: '0644'
  become: true

- name: Start monitoring stack
  ansible.builtin.command:
    cmd: docker compose up -d --pull always
    chdir: "{{ monitoring_data_dir }}"
  become: true
  changed_when: true

- name: Display monitoring access info
  ansible.builtin.debug:
    msg:
      - "Prometheus: http://{{ ansible_host }}:9090"
      - "Grafana:    http://{{ ansible_host }}:3000  (admin / {{ grafana_admin_password }})"
      - "Note: Change grafana_admin_password in vault before production use"
