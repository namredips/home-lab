---
# Deploy full observability stack via Docker Compose on the monitoring VM (203, 10.220.1.63).
# Stack: Prometheus, Grafana, node_exporter, PVE-exporter, IPMI-exporter, PBS-exporter, Loki, Promtail

# ── Docker CE ─────────────────────────────────────────────────────────────────
- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Add Docker GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Add Docker apt repository
  ansible.builtin.shell:
    cmd: >
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
      > /etc/apt/sources.list.d/docker.list
    creates: /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Add agent user to docker group
  ansible.builtin.user:
    name: agent
    groups: docker
    append: true
  become: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

# ── Directory layout ──────────────────────────────────────────────────────────
- name: Create monitoring data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - "{{ monitoring_data_dir }}"
    - "{{ monitoring_data_dir }}/prometheus"
    - "{{ monitoring_data_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_data_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_data_dir }}/grafana/provisioning/alerting"
    - "{{ monitoring_data_dir }}/grafana/dashboards"
    - "{{ monitoring_data_dir }}/loki"
    - "{{ monitoring_data_dir }}/promtail"
    - "{{ monitoring_data_dir }}/pve_exporter"
    - "{{ monitoring_data_dir }}/ipmi"
  become: true

# ── Prometheus ────────────────────────────────────────────────────────────────
- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_data_dir }}/prometheus/prometheus.yml"
    mode: '0644'
  become: true

# ── Grafana provisioning ──────────────────────────────────────────────────────
- name: Deploy Grafana datasources
  ansible.builtin.template:
    src: grafana/datasources.yml.j2
    dest: "{{ monitoring_data_dir }}/grafana/provisioning/datasources/datasources.yml"
    mode: '0644'
  become: true

- name: Deploy Grafana dashboard provider
  ansible.builtin.template:
    src: grafana/dashboards.yml.j2
    dest: "{{ monitoring_data_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    mode: '0644'
  become: true

- name: Deploy Grafana alerting provisioning
  ansible.builtin.template:
    src: grafana/alerting.yml.j2
    dest: "{{ monitoring_data_dir }}/grafana/provisioning/alerting/alerting.yml"
    mode: '0644'
  become: true

- name: Copy dashboard JSON files
  ansible.builtin.copy:
    src: "dashboards/"
    dest: "{{ monitoring_data_dir }}/grafana/dashboards/"
    mode: '0644'
  become: true

# ── Loki ──────────────────────────────────────────────────────────────────────
- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki.yml.j2
    dest: "{{ monitoring_data_dir }}/loki/loki.yml"
    mode: '0644'
  become: true

# ── Promtail ──────────────────────────────────────────────────────────────────
- name: Deploy Promtail configuration
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: "{{ monitoring_data_dir }}/promtail/promtail.yml"
    mode: '0644'
  become: true

# ── PVE Exporter ──────────────────────────────────────────────────────────────
- name: Deploy PVE exporter credentials
  ansible.builtin.template:
    src: pve_exporter.yml.j2
    dest: "{{ monitoring_data_dir }}/pve_exporter/pve.yml"
    mode: '0600'
  become: true

# ── IPMI Exporter ─────────────────────────────────────────────────────────────
- name: Deploy IPMI exporter remote config
  ansible.builtin.template:
    src: ipmi_remote.yml.j2
    dest: "{{ monitoring_data_dir }}/ipmi/config.yml"
    mode: '0600'
  become: true

# ── docker-compose ────────────────────────────────────────────────────────────
- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_data_dir }}/docker-compose.yml"
    mode: '0644'
  become: true

- name: Start monitoring stack
  ansible.builtin.command:
    cmd: docker compose up -d --pull always
    chdir: "{{ monitoring_data_dir }}"
  become: true
  changed_when: true

- name: Display monitoring access info
  ansible.builtin.debug:
    msg:
      - "Prometheus:    http://{{ ansible_host }}:9090"
      - "Grafana:       http://{{ ansible_host }}:3000  ({{ grafana_admin_user }} / {{ grafana_admin_password }})"
      - "Loki:          http://{{ ansible_host }}:3100"
      - "PVE Exporter:  http://{{ ansible_host }}:9221"
      - "IPMI Exporter: http://{{ ansible_host }}:9290"
      - "PBS Exporter:  http://{{ ansible_host }}:9101"
