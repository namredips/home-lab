---
# Configure UniFi Dream Machine syslog forwarding via the UniFi Network API.
# Setting key is 'rsyslogd'; IP field is 'ip'; port is a string.
# Uses the legacy /rest/setting endpoint which accepts X-Api-Key auth.

- name: Enable UniFi syslog forwarding to Promtail
  ansible.builtin.uri:
    url: "https://10.220.1.1/proxy/network/api/s/default/rest/setting/rsyslogd"
    method: PUT
    headers:
      X-Api-Key: "{{ vault_unifi_api_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      enabled: true
      ip: "10.220.1.63"
      port: "{{ promtail_syslog_port | string }}"
      this_controller: false
      log_all_contents: true
    validate_certs: false
    status_code: [200]
  register: unifi_syslog_result

- name: Show UniFi syslog config result
  ansible.builtin.debug:
    msg: "UniFi rsyslogd forwarding → 10.220.1.63:{{ promtail_syslog_port }} (rc={{ unifi_syslog_result.json.meta.rc }})"
