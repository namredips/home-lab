---
reset: false

# Prometheus
prometheus_scrape_interval: "30s"
prometheus_retention: "30d"

# Grafana admin credentials — override vault_grafana_admin_password in vault
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_admin_password | default('changeme') }}"

# Data directory on the monitoring VM
monitoring_data_dir: /opt/monitoring

# Exporter ports
node_exporter_port: 9100
ceph_exporter_port: 9283
pve_exporter_port: 9221
ipmi_exporter_port: 9290
pbs_exporter_port: 10019
loki_port: 3100
promtail_http_port: 9080
promtail_syslog_port: 1514

# Loki retention
loki_retention_days: 30

# UniFi Poller
unifi_poller_port: 9130

# PBS connection
pbs_host: "10.220.1.62"
pbs_port: 8007

# NUT exporter — scrapes the NUT server on r640-1 and exposes UPS metrics
nut_exporter_port: 9995
nut_server_host: "10.220.1.8"
nut_port: 3493
nut_ups_name: apc
