---
- name: Check if Hermes is already installed
  stat:
    path: /usr/local/bin/hermes
  register: hermes_binary

- name: Install Hermes Agent via curl installer
  shell: curl -fsSL https://install.herm.es | bash
  become: true
  when: not hermes_binary.stat.exists
  args:
    creates: /usr/local/bin/hermes

- name: Create Hermes config directory
  file:
    path: "{{ hermes_install_dir }}"
    state: directory
    owner: "{{ hermes_service_user }}"
    group: "{{ hermes_service_user }}"
    mode: '0755'

- name: Deploy Hermes config file
  template:
    src: config.yaml.j2
    dest: "{{ hermes_install_dir }}/config.yaml"
    owner: "{{ hermes_service_user }}"
    group: "{{ hermes_service_user }}"
    mode: '0600'
  notify: restart hermes

- name: Deploy Hermes environment file
  template:
    src: hermes.env.j2
    dest: "{{ hermes_install_dir }}/.env"
    owner: "{{ hermes_service_user }}"
    group: "{{ hermes_service_user }}"
    mode: '0600'
  notify: restart hermes

- name: Deploy agent SOUL.md
  template:
    src: SOUL.md.j2
    dest: "{{ hermes_install_dir }}/SOUL.md"
    owner: "{{ hermes_service_user }}"
    group: "{{ hermes_service_user }}"
    mode: '0644'
  notify: restart hermes

- name: Deploy Hermes systemd service
  template:
    src: hermes.service.j2
    dest: "/etc/systemd/system/{{ hermes_service_name }}.service"
    mode: '0644'
  become: true
  when: hermes_enable_service
  notify: restart hermes

- name: Reload systemd daemon
  systemd:
    daemon_reload: true
  become: true
  when: hermes_enable_service

- name: Enable and start Hermes service
  systemd:
    name: "{{ hermes_service_name }}"
    enabled: true
    state: started
  become: true
  when: hermes_enable_service

- name: Display Hermes setup summary
  debug:
    msg:
      - "Agent:   {{ agent_name | title }}"
      - "Email:   {{ agent_email }}"
      - "Config:  {{ hermes_install_dir }}/config.yaml"
      - "Model:   {{ hermes_primary_model }}"
      - "Memory:  FTS5 persistent ({{ hermes_install_dir }}/memory.db)"
      - "Service: systemctl status {{ hermes_service_name }}"
