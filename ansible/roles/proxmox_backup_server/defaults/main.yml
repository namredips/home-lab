---
reset: false

# PBS datastore — on the OS disk (no second disk needed)
pbs_datastore_name: "ceph-backup"
pbs_datastore_path: "/var/lib/proxmox-backup/ceph-backup"

# Name this storage shows up as inside Proxmox
pbs_pve_storage_name: "pbs-backup"

# Backup schedule — daily at 2 AM, snapshot mode, zstd compression
pbs_backup_schedule: "02:00"
pbs_backup_mode: "snapshot"
pbs_backup_compress: "zstd"

# VMIDs to exclude from backup (PBS itself)
pbs_backup_exclude_vmids: [202]

# Prune schedule — run after backups finish
pbs_prune_schedule: "daily 03:00"
pbs_prune_keep_daily: 7
pbs_prune_keep_weekly: 4
pbs_prune_keep_monthly: 3

# Garbage collection — weekly Sunday morning
pbs_gc_schedule: "sun 04:00"
