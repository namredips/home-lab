---
# Install and configure Proxmox Backup Server on a Debian-compatible VM.
#
# NOTE: PBS is officially supported on Debian 12 (Bookworm). This role installs
# it on Ubuntu 24.04 using the Proxmox no-subscription repository, which works
# for most functionality but is not an officially supported configuration.

# ── Install PBS packages ───────────────────────────────────────────────────────
- name: Disable PBS enterprise repo (no subscription)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pbs-enterprise.list
    content: "# PBS enterprise repo disabled — no subscription\n"
    mode: '0644'
  become: true

- name: Add Proxmox repository GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
      | gpg --dearmor -o /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
    creates: /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
  become: true

- name: Add Proxmox no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pbs-no-subscription.list
    content: "deb http://download.proxmox.com/debian/pbs bookworm pbs-no-subscription\n"
    mode: '0644'
  become: true

- name: Install Proxmox Backup Server
  ansible.builtin.apt:
    name:
      - proxmox-backup-server
    state: present
    update_cache: true
  become: true

# ── Create datastore directory ─────────────────────────────────────────────────
- name: Create PBS datastore directory
  ansible.builtin.file:
    path: "{{ pbs_datastore_path }}"
    state: directory
    mode: '0755'
    owner: backup
    group: backup
  become: true

# ── Enable PBS service ─────────────────────────────────────────────────────────
- name: Enable and start proxmox-backup service
  ansible.builtin.systemd:
    name: proxmox-backup
    enabled: true
    state: started
  become: true

# ── Create datastore (idempotent) ──────────────────────────────────────────────
- name: Check if datastore already exists
  ansible.builtin.command: proxmox-backup-manager datastore list --output-format json
  register: pbs_datastore_list
  changed_when: false
  become: true

- name: Create PBS datastore
  ansible.builtin.command: >
    proxmox-backup-manager datastore create {{ pbs_datastore_name }}
    {{ pbs_datastore_path }}
    --gc-schedule "{{ pbs_gc_schedule }}"
  become: true
  when: pbs_datastore_name not in pbs_datastore_list.stdout

# ── Create ansible@pbs user (idempotent) ──────────────────────────────────────
- name: Check if ansible@pbs user exists
  ansible.builtin.command: proxmox-backup-manager user list --output-format json
  register: pbs_user_list
  changed_when: false
  become: true

- name: Create ansible@pbs user
  ansible.builtin.command: >
    proxmox-backup-manager user create ansible@pbs
    --comment "Ansible automation user"
  become: true
  when: '"ansible@pbs" not in pbs_user_list.stdout'

- name: Grant DatastoreAdmin ACL to ansible@pbs
  ansible.builtin.command: >
    proxmox-backup-manager acl update /datastore/{{ pbs_datastore_name }}
    DatastoreAdmin --auth-id ansible@pbs
  become: true
  when: '"ansible@pbs" not in pbs_user_list.stdout'

# ── Create API token (idempotent) ──────────────────────────────────────────────
- name: Check if ansible-token exists for ansible@pbs
  ansible.builtin.command: proxmox-backup-manager user token list ansible@pbs --output-format json
  register: pbs_token_list
  changed_when: false
  become: true
  ignore_errors: true

- name: Create ansible-token for ansible@pbs
  ansible.builtin.command: >
    proxmox-backup-manager user token create ansible@pbs ansible-token
    --comment "Ansible API token"
  register: pbs_token_create
  become: true
  when: '"ansible-token" not in pbs_token_list.stdout'

- name: Display API token secret (save to vault as pbs_api_token_secret)
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "PBS API token created — save this secret to vault immediately!"
      - "ansible-vault edit inventory/group_vars/all/all.yml"
      - "  pbs_api_token_secret: {{ pbs_token_create.stdout }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  when: pbs_token_create is changed

# ── Create prune job (idempotent) ──────────────────────────────────────────────
- name: Check existing prune jobs
  ansible.builtin.command: proxmox-backup-manager prune-job list --output-format json
  register: pbs_prune_jobs
  changed_when: false
  become: true

- name: Create prune job for ceph-backup datastore
  ansible.builtin.command: >
    proxmox-backup-manager prune-job create
    --store {{ pbs_datastore_name }}
    --schedule "{{ pbs_prune_schedule }}"
    --keep-daily {{ pbs_prune_keep_daily }}
    --keep-weekly {{ pbs_prune_keep_weekly }}
    --keep-monthly {{ pbs_prune_keep_monthly }}
  become: true
  when: pbs_datastore_name not in pbs_prune_jobs.stdout

# ── Capture fingerprint ────────────────────────────────────────────────────────
- name: Get PBS TLS certificate fingerprint
  ansible.builtin.command: proxmox-backup-manager cert info --output-format json
  register: pbs_cert_info
  changed_when: false
  become: true

- name: Parse fingerprint from cert info
  ansible.builtin.set_fact:
    pbs_fingerprint: "{{ (pbs_cert_info.stdout | from_json).fingerprint }}"

# ── Display summary ────────────────────────────────────────────────────────────
- name: Display PBS configuration summary
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Proxmox Backup Server: https://{{ ansible_host }}:8007"
      - "Datastore: {{ pbs_datastore_name }} → {{ pbs_datastore_path }}"
      - "Fingerprint: {{ pbs_fingerprint }}"
      - "Retention: {{ pbs_prune_keep_daily }}d / {{ pbs_prune_keep_weekly }}w / {{ pbs_prune_keep_monthly }}m"
      - "Prune schedule: {{ pbs_prune_schedule }}"
      - "GC schedule: {{ pbs_gc_schedule }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
