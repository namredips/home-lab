---
# r640-3 — 2x E5-26xx, ~128G RAM
# Boot: sda/sdb (136.7G SAS)
# NVMe: nvme0n1 (931.5G WD Black)
# SATA: sdc, sdd (2x 931.5G Crucial)
zfs_pools:
  - name: "nvme-fast"
    mode: ""
    devices:
      - nvme0n1
    options: "-o ashift=12"
    proxmox_storage_type: zfspool
    proxmox_content: "images,rootdir"
