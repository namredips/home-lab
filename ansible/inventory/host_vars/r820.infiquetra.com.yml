---
# r820 — 4x E5-4650, 377G RAM, 64 vCPUs
# Boot: sda (136G — RAID-0 VD from PERC H710P, 146GB SAS drives)
# Ceph-Bulk VDs (PERC H710P RAID groups presented as block devices):
#   sdb (817G)  = remaining 146GB drive group
#   sdc (1.1T)  = RAID-0 of 4x 300GB drives
#   sdd (2.2T)  = RAID-0 of 4x 600GB drives
# Note: Using existing RAID VDs directly as OSDs. Ceph replication handles
#       data safety — reconfiguring 16 individual RAID-0 VDs not worth the risk.
# Ceph NIC: nic4 (QLogic qede, requires forced 10G speed)

ceph_nic: "nic4"
ceph_ip: "10.220.2.11"

ceph_disks:
  - name: sdb
    device_class: hdd
  - name: sdc
    device_class: hdd
  - name: sdd
    device_class: hdd
