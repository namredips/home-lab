---
# r640-1 — 2x E5-26xx, 125G RAM, 72 vCPUs
# Boot: sda (137G SAS, PVE)
# Ceph-Fast NVMe: nvme0n1, nvme1n1 (2x 932G WD Black NVMe) → ssd class
# Ceph-Fast SATA SSD: sdc, sdd, sde, sdf (4x 932G Crucial/WD SATA SSD) → ssd class
# Ceph NIC: nic0 (Solarflare sfc, autoneg works at 10G)
# UPS NUT: NUT server — USB cable from UPS connects to this host

# NUT — this host is the NUT server (USB-connected to Tripp Lite SMART1500LCD)
# The Tripp Lite protects networking gear (UDM, switches) — not servers.
# Shutdown is suppressed: losing the networking UPS does not justify halting servers.
nut_mode: netserver
nut_enable_shutdown: false

ceph_nic: "nic0"
ceph_ip: "10.220.2.8"

ceph_disks:
  - name: nvme0n1
    device_class: ssd
  - name: nvme1n1
    device_class: ssd
  - name: sdc
    device_class: ssd
  - name: sdd
    device_class: ssd
  - name: sde
    device_class: ssd
  - name: sdf
    device_class: ssd
