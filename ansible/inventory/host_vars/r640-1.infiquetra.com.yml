---
# r640-1 — 2x E5-26xx, 125G RAM, 72 vCPUs
# Boot: sda (137G SAS, PVE)
# Ceph-Fast NVMe: nvme0n1, nvme1n1 (2x 932G WD Black NVMe) → ssd class
# Ceph-Fast SATA SSD: sdc, sdd, sde, sdf (4x 932G Crucial/WD SATA SSD) → ssd class
# Ceph NIC: nic0 (Solarflare sfc, autoneg works at 10G)

ceph_nic: "nic0"
ceph_ip: "10.220.2.8"

ceph_disks:
  - name: nvme0n1
    device_class: ssd
  - name: nvme1n1
    device_class: ssd
  - name: sdc
    device_class: ssd
  - name: sdd
    device_class: ssd
  - name: sde
    device_class: ssd
  - name: sdf
    device_class: ssd
