---
# r420 — 2x E5-2420v2, 70G RAM, 24 vCPUs
# Boot: sda (931G SAS, PVE)
# Ceph-Bulk: sdb, sdc, sdd (3x 931G SAS) → hdd device class
# Ceph NIC: nic2 (QLogic qede, requires forced 10G speed)

ceph_nic: "nic2"
ceph_ip: "10.220.2.7"

ceph_disks:
  - name: sdb
    device_class: hdd
  - name: sdc
    device_class: hdd
  - name: sdd
    device_class: hdd
