---
# service_vms.yml — Create service VMs and deploy their roles
#
# Phase 1:  Create all service VMs (proxmox_vm role; idempotent — skips existing VMs)
# Phase 2+: Deploy role-specific software on each service VM
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml service_vms.yml \
#     --vault-password-file ~/.vault_pass.txt
#
# Single service (example):
#   ansible-playbook -i inventory/hosts.yml service_vms.yml \
#     --tags monitoring --vault-password-file ~/.vault_pass.txt
#
# Reset (destroy VMs + remove data):
#   ansible-playbook -i inventory/hosts.yml service_vms.yml \
#     -e reset=true --vault-password-file ~/.vault_pass.txt
#
# Service VM summary:
#   200 rustdesk  → r820        10.220.1.60  RustDesk relay/rendezvous
#   201 ome       → r820        10.220.1.61  Dell OpenManage Enterprise (OVA import — see dell_ome role)
#   202 pbs       → r720xd      10.220.1.62  Proxmox Backup Server (ceph-bulk storage)
#   203 monitoring → r640-3     10.220.1.63  Prometheus + Grafana + Loki full observability

# Phase 1 — Create all service VMs via Proxmox
- name: Provision service VMs on Proxmox hosts
  hosts: proxmox_hosts
  gather_facts: false
  tags: always
  roles:
    - proxmox_vm

# Phase 2 — RustDesk
- name: Deploy RustDesk server
  hosts: rustdesk.infiquetra.com
  gather_facts: true
  tags: rustdesk
  roles:
    - rustdesk_server

# Phase 3 — Dell OME (displays import instructions — OVA must be imported manually)
- name: Dell OME import instructions
  hosts: localhost
  gather_facts: false
  tags: ome
  roles:
    - dell_ome

# Phase 4 — Proxmox Backup Server
- name: Deploy Proxmox Backup Server
  hosts: pbs.infiquetra.com
  gather_facts: true
  tags: pbs
  roles:
    - proxmox_backup_server
  post_tasks:
    # The PBS exporter queries /nodes which requires Admin role.
    # DatastoreAudit is insufficient — /api2/json/nodes returns 403 without Admin.
    - name: Grant ansible API token Admin role at root path
      ansible.builtin.command: >
        proxmox-backup-manager acl update / Admin
        --auth-id ansible@pbs!ansible-token
      register: pbs_acl_result
      changed_when: pbs_acl_result.rc == 0
      become: true

# Phase 4b — Register PBS in Proxmox and create backup job
- name: Register PBS storage and backup job in Proxmox cluster
  hosts: proxmox_master
  gather_facts: false
  tags: pbs
  vars:
    pbs_host: "10.220.1.62"
    # Mirror of proxmox_backup_server defaults — needed here since role isn't loaded on proxmox_master
    pbs_pve_storage_name: "pbs-backup"
    pbs_datastore_name: "ceph-backup"
    pbs_backup_schedule: "02:00"
    pbs_backup_mode: "snapshot"
    pbs_backup_compress: "zstd"
    pbs_backup_exclude_vmids: [202]
    pbs_prune_keep_daily: 7
    pbs_prune_keep_weekly: 4
    pbs_prune_keep_monthly: 3
  tasks:
    - name: Get PBS TLS fingerprint
      ansible.builtin.shell: >
        echo | openssl s_client -connect {{ pbs_host }}:8007 2>/dev/null
        | openssl x509 -fingerprint -sha256 -noout
        | sed 's/.*=//'
        | tr 'A-F' 'a-f'
      register: pbs_fp_raw
      changed_when: false

    - name: Set fingerprint fact
      ansible.builtin.set_fact:
        pbs_fingerprint: "{{ pbs_fp_raw.stdout | trim }}"

    - name: Check if PBS storage is already registered
      ansible.builtin.command: pvesm status
      register: pvesm_status
      changed_when: false

    - name: Register PBS as Proxmox storage
      ansible.builtin.command: >
        pvesm add pbs {{ pbs_pve_storage_name }}
        --server {{ pbs_host }}
        --username {{ pbs_api_user }}!{{ pbs_api_token_id }}
        --password {{ pbs_api_token_secret }}
        --datastore {{ pbs_datastore_name }}
        --fingerprint {{ pbs_fingerprint }}
      when: pbs_pve_storage_name not in pvesm_status.stdout

    - name: Check existing cluster backup jobs
      ansible.builtin.command: pvesh get /cluster/backup --output-format json
      register: existing_backup_jobs
      changed_when: false

    - name: Create scheduled backup job for all VMs
      ansible.builtin.command: >
        pvesh create /cluster/backup
        --all 1
        --exclude {{ pbs_backup_exclude_vmids | join(',') }}
        --storage {{ pbs_pve_storage_name }}
        --schedule "{{ pbs_backup_schedule }}"
        --mode {{ pbs_backup_mode }}
        --compress {{ pbs_backup_compress }}
        --prune-backups keep-daily={{ pbs_prune_keep_daily }},keep-weekly={{ pbs_prune_keep_weekly }},keep-monthly={{ pbs_prune_keep_monthly }}
      when: pbs_pve_storage_name not in existing_backup_jobs.stdout

# Phase 5 — Install node_exporter on all scrape targets
# Prometheus (on monitoring VM) scrapes :9100 on proxmox_hosts and agent_vms.
- name: Install node_exporter on Proxmox hosts
  hosts: proxmox_hosts
  gather_facts: true
  tags: monitoring
  tasks:
    - name: Install prometheus-node-exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true
      become: true

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started
      become: true

- name: Install node_exporter on agent VMs
  hosts: agent_vms
  gather_facts: true
  tags: monitoring
  tasks:
    - name: Install prometheus-node-exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true
      become: true

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started
      become: true

    # Enable systemd collector so Hermes + Ollama service states are visible in Prometheus.
    # The ARGS environment variable is read by prometheus-node-exporter's systemd unit.
    - name: Enable node_exporter systemd collector on agent VMs
      ansible.builtin.lineinfile:
        path: /etc/default/prometheus-node-exporter
        regexp: '^ARGS='
        line: 'ARGS="--collector.systemd --collector.systemd.unit-include=hermes-.+\\.service|ollama.service"'
        create: true
        mode: '0644'
      become: true
      notify: Restart node_exporter

  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: restarted
      become: true

# Phase 5a — Install node_exporter on service VMs scraped by Prometheus
# RustDesk (200) and PBS (202) — not OME (Windows), not monitoring (has its own job)
- name: Install node_exporter on service VMs
  hosts: rustdesk.infiquetra.com,pbs.infiquetra.com,runner_vms
  gather_facts: true
  tags: monitoring
  tasks:
    - name: Install prometheus-node-exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true
      become: true

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started
      become: true

# Phase 5b — Enable Ceph mgr prometheus module (cluster-wide via proxmox_master)
# Exposes Ceph metrics on :9283 on the active mgr node.
- name: Enable Ceph mgr prometheus module
  hosts: proxmox_master
  gather_facts: false
  tags: monitoring
  tasks:
    - name: Enable prometheus module in ceph-mgr
      ansible.builtin.command: ceph mgr module enable prometheus
      register: ceph_mgr_result
      changed_when: "'already enabled' not in ceph_mgr_result.stderr"
      failed_when: ceph_mgr_result.rc != 0 and 'already enabled' not in ceph_mgr_result.stderr

# Phase 5c — rsyslog forwarding on PVE hosts → Promtail on monitoring VM
# PVE (Debian Trixie) uses journald only — install rsyslog first.
- name: Configure rsyslog forwarding on Proxmox hosts
  hosts: proxmox_hosts
  gather_facts: false
  tags: monitoring
  vars:
    promtail_syslog_port: 1514
  tasks:
    - name: Install rsyslog on PVE hosts
      ansible.builtin.apt:
        name: rsyslog
        state: present
        update_cache: true
      become: true

    - name: Deploy rsyslog remote forwarding config
      ansible.builtin.template:
        src: roles/monitoring/templates/rsyslog-remote.conf.j2
        dest: /etc/rsyslog.d/60-monitoring.conf
        mode: '0644'
      become: true
      notify: Restart rsyslog

  handlers:
    - name: Restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        enabled: true
        state: restarted
      become: true

# Phase 5d — rsyslog forwarding on agent VMs → Promtail
# Ubuntu 24.04 also ships without rsyslog by default.
- name: Configure rsyslog forwarding on agent VMs
  hosts: agent_vms
  gather_facts: false
  tags: monitoring
  vars:
    promtail_syslog_port: 1514
  tasks:
    - name: Install rsyslog on agent VMs
      ansible.builtin.apt:
        name: rsyslog
        state: present
        update_cache: true
      become: true

    - name: Deploy rsyslog remote forwarding config
      ansible.builtin.template:
        src: roles/monitoring/templates/rsyslog-remote.conf.j2
        dest: /etc/rsyslog.d/60-monitoring.conf
        mode: '0644'
      become: true
      notify: Restart rsyslog

  handlers:
    - name: Restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        enabled: true
        state: restarted
      become: true

# Phase 5e — Configure UniFi Dream Machine syslog forwarding via API
- name: Configure UniFi syslog forwarding
  hosts: localhost
  gather_facts: false
  tags: monitoring
  vars:
    promtail_syslog_port: 1514
  tasks:
    - name: Include UniFi syslog task
      ansible.builtin.include_tasks: roles/monitoring/tasks/unifi_syslog.yml

# Phase 5f — Resize monitoring VM (203) to 4 vCPU / 8 GB before deploying the stack
- name: Resize monitoring VM resources
  hosts: r640-3.infiquetra.com
  gather_facts: false
  tags: monitoring
  tasks:
    - name: Get current monitoring VM config
      ansible.builtin.command: qm config 203
      register: vm_config
      changed_when: false

    - name: Resize monitoring VM to 4 vCPU / 8 GB
      ansible.builtin.command: qm set 203 --memory 8192 --cores 4
      when:
        - "'cores: 4' not in vm_config.stdout or 'memory: 8192' not in vm_config.stdout"
      register: vm_resize

    - name: Reboot monitoring VM to apply new resources
      ansible.builtin.command: qm reboot 203
      when: vm_resize is changed

    - name: Wait for monitoring VM to come back up
      ansible.builtin.wait_for:
        host: "10.220.1.63"
        port: 22
        delay: 10
        timeout: 120
      when: vm_resize is changed

# Phase 6 — Monitoring (Prometheus + Grafana + Loki + exporters)
- name: Deploy monitoring stack
  hosts: monitoring.infiquetra.com
  gather_facts: true
  tags: monitoring
  roles:
    - monitoring
