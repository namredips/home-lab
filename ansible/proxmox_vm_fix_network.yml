---
# Diagnose and fix IPv4 networking in agent VMs via QEMU guest agent.
# Does not require SSH — uses qm guest exec which talks directly to the
# qemu-guest-agent process running inside each VM.
#
# Proxmox 9.x command is: qm guest exec <vmid> [OPTIONS] [<extra-args>]
# Use --synchronize 1 to block and return stdout/stderr.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml proxmox_vm_fix_network.yml \
#     --vault-password-file ~/.vault_pass.txt

- name: Fix agent VM networking via QEMU guest agent
  hosts: proxmox_hosts
  gather_facts: false
  vars:
    agents:
      zeus:
        vmid: 100
        host: r820.infiquetra.com
        ip: 10.220.1.50
      athena:
        vmid: 101
        host: r820.infiquetra.com
        ip: 10.220.1.51
      apollo:
        vmid: 102
        host: r820.infiquetra.com
        ip: 10.220.1.52
      artemis:
        vmid: 103
        host: r420.infiquetra.com
        ip: 10.220.1.53
      hermes:
        vmid: 104
        host: r420.infiquetra.com
        ip: 10.220.1.54
      perseus:
        vmid: 105
        host: r720xd.infiquetra.com
        ip: 10.220.1.55
      prometheus:
        vmid: 106
        host: r720xd.infiquetra.com
        ip: 10.220.1.56
      ares:
        vmid: 107
        host: r720xd.infiquetra.com
        ip: 10.220.1.57

  tasks:
    - name: Build list of VMs for this Proxmox host
      ansible.builtin.set_fact:
        host_vms: >-
          {{
            agents | dict2items
            | selectattr('value.host', 'equalto', inventory_hostname)
            | list
          }}

    # ── Step 1: Confirm VMs are running ────────────────────────────────────────
    - name: Check VM status
      ansible.builtin.command: qm status {{ item.value.vmid }}
      register: vm_status
      loop: "{{ host_vms }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.vmid }})"
      changed_when: false
      failed_when: false

    - name: Display VM status
      ansible.builtin.debug:
        msg: "{{ item.item.key }} ({{ item.item.value.vmid }}): {{ item.stdout }}"
      loop: "{{ vm_status.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # ── Step 2: Wait for guest agent ───────────────────────────────────────────
    # In Proxmox 9.x the ping command is: qm agent <vmid> ping
    # Retries for 3 minutes to allow apt-get upgrade to complete first.
    - name: Wait for QEMU guest agent on each VM
      ansible.builtin.command: qm agent {{ item.value.vmid }} ping
      register: agent_ping
      until: agent_ping.rc == 0
      retries: 36       # 3 minutes total (36 x 5s)
      delay: 5
      loop: "{{ host_vms }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.vmid }})"
      ignore_errors: true
      changed_when: false

    # ── Step 3: Get current IP via guest exec ──────────────────────────────────
    # In Proxmox 9.x: qm guest exec (not qm exec)
    # --synchronize 1 blocks until command finishes and returns stdout
    - name: Get current IPv4 address via guest agent
      ansible.builtin.command:
        argv:
          - qm
          - guest
          - exec
          - "{{ item.value.vmid }}"
          - --synchronize
          - "1"
          - --timeout
          - "30"
          - bash
          - -c
          - "ip -4 addr show eth0 | grep -oP '(?<=inet )[\\d.]+' | head -1 || echo NONE"
      register: current_ips
      loop: "{{ host_vms }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.vmid }})"
      ignore_errors: true
      changed_when: false

    - name: Report current VM IPs
      ansible.builtin.debug:
        msg: >-
          {{ item.item.key }} (vmid {{ item.item.value.vmid }}):
          current IP = {{ item.stdout | default('unknown') | trim }},
          expected = {{ item.item.value.ip }}
      loop: "{{ current_ips.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # ── Step 4: Fix DHCP if IPv4 is missing or wrong ──────────────────────────
    - name: Restart networkd and renew DHCP lease
      ansible.builtin.command:
        argv:
          - qm
          - guest
          - exec
          - "{{ item.item.value.vmid }}"
          - --synchronize
          - "1"
          - --timeout
          - "60"
          - bash
          - -c
          - "systemctl restart systemd-networkd && sleep 3 && ip -4 addr show eth0"
      loop: "{{ current_ips.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: >-
        item.rc != 0
        or (item.stdout | default('') | trim | length == 0)
        or (item.stdout | default('') | trim == 'NONE')
        or (item.stdout | default('') | trim != item.item.value.ip)
      register: dhcp_fix
      ignore_errors: true

    - name: Show DHCP fix output
      ansible.builtin.debug:
        msg: "{{ item.item.item.key }}: {{ item.stdout | default(item.stderr) | default('n/a') | trim }}"
      loop: "{{ dhcp_fix.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item.key | default('unknown') }}"
      when: item is not skipped

    # ── Step 5: Check and restart SSH if needed ────────────────────────────────
    - name: Check SSH service and restart if inactive
      ansible.builtin.command:
        argv:
          - qm
          - guest
          - exec
          - "{{ item.value.vmid }}"
          - --synchronize
          - "1"
          - --timeout
          - "30"
          - bash
          - -c
          - >-
            s=$(systemctl is-active ssh 2>/dev/null || systemctl is-active sshd 2>/dev/null || echo inactive);
            echo "ssh=$s";
            if [ "$s" != "active" ]; then
              systemctl restart ssh 2>/dev/null || systemctl restart sshd 2>/dev/null || true;
              echo "restarted";
            fi
      register: ssh_check
      loop: "{{ host_vms }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.vmid }})"
      ignore_errors: true
      changed_when: "'restarted' in (ssh_check.stdout | default(''))"

    - name: Show SSH status
      ansible.builtin.debug:
        msg: "{{ item.item.key }}: {{ item.stdout | default('guest exec failed') | trim }}"
      loop: "{{ ssh_check.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # ── Step 6: Final IP summary ───────────────────────────────────────────────
    - name: Get final IP addresses
      ansible.builtin.command:
        argv:
          - qm
          - guest
          - exec
          - "{{ item.value.vmid }}"
          - --synchronize
          - "1"
          - --timeout
          - "20"
          - bash
          - -c
          - "ip -4 addr show eth0 | grep -oP '(?<=inet )[\\d.]+' | head -1 || echo NONE"
      register: final_ips
      loop: "{{ host_vms }}"
      loop_control:
        label: "{{ item.key }} ({{ item.value.vmid }})"
      ignore_errors: true
      changed_when: false

    - name: Final VM state summary
      ansible.builtin.debug:
        msg: >-
          {{ item.item.key }} (vmid {{ item.item.value.vmid }}):
          IP={{ item.stdout | default('?') | trim }}
          expected={{ item.item.value.ip }}
          {{ 'OK' if (item.stdout | default('') | trim == item.item.value.ip) else 'MISMATCH' }}
      loop: "{{ final_ips.results }}"
      loop_control:
        label: "{{ item.item.key }}"
